name: codeql

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - LICENSE
      - CITATION.cff
      - SECURITY.md
      - MEMOIRE-LOCALE.md
      - docs/**
      - src/content/**
      - public/**/*.json
      - public/**/*.csv
      - public/**/*.svg
      - public/**/*.png
      - public/**/*.jpg
      - public/**/*.jpeg
      - public/**/*.webp
      - public/**/*.ico
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md
      - LICENSE
      - CITATION.cff
      - SECURITY.md
      - MEMOIRE-LOCALE.md
      - docs/**
      - src/content/**
      - public/**/*.json
      - public/**/*.csv
      - public/**/*.svg
      - public/**/*.png
      - public/**/*.jpg
      - public/**/*.jpeg
      - public/**/*.webp
      - public/**/*.ico
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: /language:javascript-typescript
