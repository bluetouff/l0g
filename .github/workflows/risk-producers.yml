name: risk producers

on:
  workflow_dispatch:
  schedule:
    - cron: '7,37 * * * *'

permissions:
  contents: read

concurrency:
  group: risk-producers
  cancel-in-progress: true

jobs:
  end-to-end:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Test the monitoring contract
        run: node --test scripts/risk-producer-audit.test.mjs scripts/risk-deployment.test.mjs
      - name: Probe producers, aggregator and both histories
        run: node scripts/check-risk-producers.mjs
