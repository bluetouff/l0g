name: risk producers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/risk-producers.yml
      - scripts/check-risk-producers.mjs
      - scripts/risk-producer-audit.mjs
      - scripts/risk-producer-audit.test.mjs
      - scripts/risk-deployment.test.mjs
      - ops/risk-aggregator/**
      - deploy/l0g.fr.apache.conf
  schedule:
    - cron: '7,37 * * * *'

permissions:
  contents: read

concurrency:
  group: risk-producers
  cancel-in-progress: true

jobs:
  end-to-end:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - name: Test the monitoring contract
        run: node --test scripts/risk-producer-audit.test.mjs scripts/risk-deployment.test.mjs
      - name: Probe producers, aggregator and both histories
        run: node scripts/check-risk-producers.mjs
