name: build

# Le build et toute la toolchain npm vivent ici, sur un runner éphémère
# détruit après chaque exécution. zen ne build jamais et ne détient aucun
# secret de déploiement.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: write # nécessaire uniquement pour pousser sur la branche `built`
  id-token: write # nécessaire pour les attestations Sigstore/GitHub OIDC
  attestations: write
  artifact-metadata: write

concurrency:
  group: build-${{ github.ref }}
  # Une publication forme une transaction built + archive. Ne pas couper entre les deux pushes.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions officielles uniquement, épinglées sur un SHA immuable.
      # Renovate conserve le SHA et le commentaire de version à jour.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Require the current main commit
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          git fetch --no-tags origin main:refs/remotes/origin/main
          test "$GITHUB_SHA" = "$(git rev-parse refs/remotes/origin/main)"

      - name: Fix deterministic build timestamp
        run: |
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            echo "L0G_BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          else
            echo "L0G_BUILD_TIMESTAMP=$(git show -s --format=%cI HEAD)" >> "$GITHUB_ENV"
          fi
          echo "L0G_SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Checkout or initialize append-only Black Box archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code origin refs/heads/black-box-archive >/dev/null 2>&1; then
            git fetch origin black-box-archive:refs/remotes/origin/black-box-archive
            git worktree add -B black-box-archive .black-box-archive origin/black-box-archive
          else
            mkdir -p .black-box-archive/frames
            git -C .black-box-archive init -q -b black-box-archive
            git -C .black-box-archive config user.name "github-actions[bot]"
            git -C .black-box-archive config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            touch .black-box-archive/frames/.gitkeep
            git -C .black-box-archive add frames/.gitkeep
            git -C .black-box-archive commit -q -m "Initialize append-only Black Box archive"
          fi
          node scripts/black-box-archive.mjs validate --archive .black-box-archive

      - name: Install (lockfile strict)
        run: npm ci

      - name: Test release and deployment contracts
        run: |
          npm run test:editorial-protocol
          npm run test:deploy

      - name: Build (Astro + Agent Surface test + Pagefind)
        env:
          L0G_BLACK_BOX_ARCHIVE_DIR: ${{ github.workspace }}/.black-box-archive
        run: npm run build

      - name: Append immutable Black Box frame
        env:
          L0G_BLACK_BOX_ARCHIVE_DIR: ${{ github.workspace }}/.black-box-archive
          BLACK_BOX_COMPUTED_AT: ${{ env.L0G_BUILD_TIMESTAMP }}
          BLACK_BOX_ATTESTATION_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node scripts/black-box-archive.mjs append --archive .black-box-archive --dist dist --git-sha "$GITHUB_SHA" --id-suffix "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          changes=$(git -C .black-box-archive status --porcelain)
          test -n "$changes"
          if printf '%s\n' "$changes" | grep -Ev '^\?\? frames/[^/]+\.json$'; then
            echo "Refus: une frame passée a été modifiée, supprimée ou renommée."
            exit 1
          fi

      - name: Rebuild from immutable archive
        env:
          L0G_BLACK_BOX_ARCHIVE_DIR: ${{ github.workspace }}/.black-box-archive
        run: |
          npx astro build
          npm run test:security
          npm run test:agent-surface
          npx pagefind --site dist
          npm run test:internal-links

      - name: Test MCP server against built Agent Surface
        env:
          L0G_DATA_DIR: ${{ github.workspace }}/dist
          MCP_ALLOWED_HOSTS: 127.0.0.1,localhost
          MCP_ALLOWED_ORIGINS: http://127.0.0.1:8851
          MCP_GIT_SHA: ${{ github.sha }}
          MCP_HOST: 127.0.0.1
          MCP_PORT: 8851
          MCP_USAGE_PATH: ${{ runner.temp }}/l0g-mcp-usage.json
          URL: http://127.0.0.1:8851/mcp
        run: |
          cd mcp-server
          npm ci --omit=dev
          node server.mjs &
          MCP_PID=$!
          trap 'kill "$MCP_PID" 2>/dev/null || true' EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8851/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8851/healthz
          node test-client.mjs
          node agent-bench.mjs --url "$URL" --output ../dist/api/v1/agent-bench.json

      - name: Package deterministic static release
        env:
          SOURCE_DATE_EPOCH: ${{ env.L0G_SOURCE_DATE_EPOCH }}
        run: |
          mkdir -p release
          {
            echo 'L0G_RELEASE_SCHEMA=1'
            echo "L0G_RELEASE_REPOSITORY=${GITHUB_REPOSITORY}"
            echo "L0G_RELEASE_SOURCE_REF=${GITHUB_REF}"
            echo "L0G_RELEASE_SOURCE_SHA=${GITHUB_SHA}"
            echo "L0G_RELEASE_RUN_ID=${GITHUB_RUN_ID}"
            echo "L0G_RELEASE_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT}"
          } > release/source.env
          install -m 0644 release/source.env dist/source.env
          tar --sort=name --mtime="@${SOURCE_DATE_EPOCH}" --owner=0 --group=0 --numeric-owner \
            --pax-option=delete=atime,delete=ctime -C dist -cf - . \
            | gzip -n > release/l0g-site.tar.gz
          (cd release && sha256sum l0g-site.tar.gz > l0g-site.tar.gz.sha256)

      - name: Attest the complete static release and Agent Surface manifests
        id: attest_static
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release/l0g-site.tar.gz
            dist/agents.json
            dist/openapi.json
            dist/api/v1/integrity.json
            dist/api/v1/black-box.json
            dist/api/v1/agent-bench.json

      - name: Stage the offline attestation bundle
        run: cp "${{ steps.attest_static.outputs.bundle-path }}" release/l0g-site.tar.gz.sigstore.jsonl

      - name: Publish to `built` branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep the static tree at the branch root during the server migration.
          # The attested deployer ignores it and activates only the verified archive;
          # the legacy deployer can still serve the site without an outage.
          mkdir -p publish
          cp -a dist/. publish/
          cp -a release/. publish/
          cd publish
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "build ${GITHUB_SHA}"
          git branch -M built
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" built

      - name: Publish append-only Black Box archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git -C .black-box-archive config user.name "github-actions[bot]"
          git -C .black-box-archive config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .black-box-archive add frames
          git -C .black-box-archive commit -q -m "frame ${GITHUB_SHA::8}"
          git -C .black-box-archive push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:black-box-archive
