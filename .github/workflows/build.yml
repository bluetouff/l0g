name: build

# Le build et toute la toolchain npm vivent ici, sur un runner éphémère
# détruit après chaque exécution. zen ne build jamais et ne détient aucun
# secret de déploiement.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # nécessaire uniquement pour pousser sur la branche `built`
  id-token: write # nécessaire pour les attestations Sigstore/GitHub OIDC
  attestations: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions officielles uniquement. Renovate (pinDigests) remplacera ces
      # tags par des digests SHA dès sa première PR — voir renovate.json.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (lockfile strict)
        run: npm ci

      - name: Build (Astro + Agent Surface test + Pagefind)
        run: npm run build

      - name: Test MCP server against built Agent Surface
        env:
          L0G_DATA_DIR: ${{ github.workspace }}/dist
          MCP_ALLOWED_HOSTS: 127.0.0.1,localhost
          MCP_ALLOWED_ORIGINS: http://127.0.0.1:8851
          MCP_GIT_SHA: ${{ github.sha }}
          MCP_HOST: 127.0.0.1
          MCP_PORT: 8851
          URL: http://127.0.0.1:8851/mcp
        run: |
          cd mcp-server
          npm ci --omit=dev
          node server.mjs &
          MCP_PID=$!
          trap 'kill "$MCP_PID" 2>/dev/null || true' EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8851/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8851/healthz
          node test-client.mjs

      - name: Attest Agent Surface manifests
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/agents.json
            dist/openapi.json
            dist/api/v1/integrity.json

      - name: Publish to `built` branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "build ${GITHUB_SHA::8}"
          git branch -M built
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" built
