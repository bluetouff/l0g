<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>l0g claim review</title>
<style>
:root{font-family:Inter,system-ui,sans-serif;color-scheme:dark;background:#0b0d10;color:#e8edf2}*{box-sizing:border-box}body{margin:0}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:minmax(310px,38vw) 1fr;height:100vh}.left{border-right:1px solid #27303a;overflow:auto}.head{position:sticky;top:0;background:#0b0d10ef;backdrop-filter:blur(10px);padding:18px;border-bottom:1px solid #27303a;z-index:2}.brand{display:flex;justify-content:space-between;align-items:center;gap:12px}.brand h1{font-size:18px;margin:0}.counts{font-size:12px;color:#9fb0c0}.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:14px}.toolbar input,.toolbar select,.form input,.form select,.form textarea,.commit input{width:100%;background:#12171d;color:#edf3f8;border:1px solid #313c47;border-radius:8px;padding:10px}.list{padding:10px}.claim{width:100%;text-align:left;background:transparent;color:inherit;border:1px solid transparent;border-radius:10px;padding:12px;margin-bottom:6px}.claim:hover{background:#12171d}.claim.active{border-color:#52d3a2;background:#102019}.claim.reviewed .status{color:#52d3a2}.claim-title{font-size:13px;font-weight:700;margin-bottom:5px}.claim-text{font-size:12px;color:#aebdca;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.status{font-size:11px;color:#f2b84b;margin-top:7px}.main{overflow:auto;padding:26px}.empty{color:#90a1b0;padding:10vh 5vw}.panel{max-width:920px;margin:auto}.eyebrow{font:12px ui-monospace,monospace;color:#52d3a2}.panel h2{font-size:28px;margin:8px 0 12px}.claim-full{font-size:18px;line-height:1.6;background:#11171c;border-left:3px solid #52d3a2;padding:18px;border-radius:6px}.meta{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}.pill{font-size:12px;border:1px solid #33404b;border-radius:99px;padding:5px 9px;color:#b9c7d2}.refs{display:grid;gap:8px;margin:18px 0}.ref{display:flex;justify-content:space-between;gap:12px;color:#d8e5ef;text-decoration:none;background:#12171d;border:1px solid #2a333d;border-radius:8px;padding:11px}.ref small{color:#92a4b4}.actions{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}.btn{border:0;border-radius:8px;padding:10px 14px;background:#283441;color:#fff;text-decoration:none}.btn.primary{background:#1d8f68}.btn.danger{background:#8c3341}.btn:disabled{opacity:.5;cursor:not-allowed}.form{margin-top:22px;padding-top:22px;border-top:1px solid #27303a;display:grid;gap:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field label{display:block;font-size:12px;color:#9fb0c0;margin-bottom:6px}.form textarea{min-height:92px;resize:vertical}.proof-fields{display:none;grid-template-columns:180px 1fr;gap:12px}.proof-fields.visible{display:grid}.commit{margin-top:28px;border:1px solid #31404d;background:#10151a;border-radius:12px;padding:16px}.commit-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center}.push{display:flex;align-items:center;gap:6px;font-size:13px}.push input{width:auto}.log{white-space:pre-wrap;background:#07090b;border-radius:8px;padding:12px;max-height:260px;overflow:auto;color:#b9c8d4;font:12px ui-monospace,monospace;display:none;margin-top:12px}.log.visible{display:block}.toast{position:fixed;right:20px;bottom:20px;padding:12px 16px;border-radius:9px;background:#1d8f68;color:white;box-shadow:0 8px 30px #0008}.toast.error{background:#9d3948}@media(max-width:850px){.app{grid-template-columns:1fr}.left{height:42vh;border-right:0;border-bottom:1px solid #27303a}.main{height:58vh;padding:18px}.row,.commit-row,.proof-fields{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="left">
    <div class="head">
      <div class="brand"><h1>l0g · review</h1><span class="counts" id="counts"></span></div>
      <div class="toolbar">
        <input id="search" placeholder="Filtrer article, texte, source…" autofocus>
        <select id="filter"><option value="pending">À revoir</option><option value="reviewed">Relues</option><option value="all">Toutes</option></select>
      </div>
    </div>
    <div class="list" id="list"></div>
  </aside>
  <main class="main"><div id="detail" class="empty">Sélectionne une claim.</div></main>
</div>
<script>
const REVIEW_TOKEN = "__REVIEW_TOKEN_PLACEHOLDER__";
let state=null,selected=null;const $=s=>document.querySelector(s);
function esc(v=''){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function api(path,options={}){const res=await fetch(path,{headers:{'content-type':'application/json','x-review-token':REVIEW_TOKEN,...(options.headers||{})},method:options.method||'GET',body:options.body});const data=await res.json();if(!res.ok)throw new Error(data.error||'Erreur');return data}
function toast(message,error=false){const n=document.createElement('div');n.className='toast'+(error?' error':'');n.textContent=message;document.body.appendChild(n);setTimeout(()=>n.remove(),3200)}
function currentList(){const q=$('#search').value.trim().toLowerCase(),f=$('#filter').value;return state.claims.filter(c=>{const reviewed=c.review?.status==='canonical';if(f==='pending'&&reviewed)return false;if(f==='reviewed'&&!reviewed)return false;const hay=[c.articleTitle,c.claim,c.kind,...(c.references||[]).flatMap(r=>[r.label,r.href,r.host])].join(' ').toLowerCase();return !q||hay.includes(q)})}
function commitMessage(){
  const value=$('#message').value||'';
  return String(value).trim()||'Review evidence claims';
}
function commitMessageIsDefault(){
  const value=$('#message').value||'';
  return !String(value).trim();
}
function renderList(){const list=currentList(),canonical=state.registry.entries.filter(x=>x.status==='canonical').length,legacy=state.registry.entries.filter(x=>x.status!=='canonical').length;$('#counts').textContent=canonical+' canoniques · '+legacy+' legacy / '+state.claims.length;$('#list').innerHTML=list.map(c=>`<button class="claim ${c.review?.status==='canonical'?'reviewed':''} ${selected===c.id?'active':''}" data-id="${esc(c.id)}"><div class="claim-title">${esc(c.articleTitle)}</div><div class="claim-text">${esc(c.claim)}</div><div class="status">${c.review?.status==='canonical'?'✓ canonique':c.review?'△ revue legacy':'○ non revue'} · ${esc(c.kind)}</div></button>`).join('')||'<div class="empty">Aucun résultat.</div>';document.querySelectorAll('.claim').forEach(n=>n.onclick=()=>selectClaim(n.dataset.id))}
function selectClaim(id){selected=id;renderList();renderDetail()}
function renderDetail(){const c=state.claims.find(x=>x.id===selected);if(!c){$('#detail').className='empty';$('#detail').textContent='Sélectionne une claim.';return}const r=c.review||{},proof=r.proofDepth||'';$('#detail').className='panel';$('#detail').innerHTML=`
<div class="eyebrow">${esc(c.id)}</div><h2>${esc(c.articleTitle)}</h2><div class="claim-full">${esc(c.claim)}</div>
<div class="meta"><span class="pill">auto: ${esc(c.kind)}</span><span class="pill">claim: ${esc(c.claimDate||'—')}</span><span class="pill">observation: ${esc(c.observationDateLabel||'—')}</span><span class="pill">${c.review?.status==='canonical'?'canonique':c.review?'legacy à requalifier':'heuristique non revue'}</span></div>
<div class="actions"><a class="btn" target="_blank" rel="noopener" href="${esc(c.articleUrl)}">Ouvrir l’article</a><button class="btn" id="openSources">Ouvrir les sources</button></div>
<div class="refs">${(c.references||[]).map(x=>`<a class="ref" target="_blank" rel="noopener" href="${esc(x.href)}"><span><strong>${esc(x.label)}</strong><br><small>${esc(x.kind||x.host||'référence')} · ${esc(x.sourcePublicationDateLabel||x.dateLabel||'date inconnue')}</small></span><span>↗</span></a>`).join('')}</div>
<div class="form"><div class="row"><div class="field"><label>Type validé</label><select id="kind">${['fait','estimation','inférence','scénario'].map(k=>`<option ${k===(r.kind||c.kind)?'selected':''}>${k}</option>`).join('')}</select></div><div class="field"><label>Reviewer</label><input id="reviewedBy" value="${esc(r.reviewedBy||state.reviewer)}"></div></div>
<div class="field"><label>Note de revue</label><textarea id="note" placeholder="Ex. Chiffre, unité, date et série FRED vérifiés.">${esc(r.note||'')}</textarea></div>
<div class="field"><label>Niveau de preuve</label><select id="proof"><option value="direct-proof" ${proof!=='reproduction'?'selected':''}>Preuve directe</option><option value="reproduction" ${proof==='reproduction'?'selected':''}>Reproduction</option></select></div>
<div id="proofFields" class="proof-fields visible"><div class="field"><label>Type de localisateur</label><select id="locatorType">${['page','paragraph','section','table','series','cell','form','accession','doi','calculation','other'].map(k=>`<option ${k===(r.evidenceLocator?.type||'section')?'selected':''}>${k}</option>`).join('')}</select></div><div class="field"><label>Localisation exacte</label><input id="locatorValue" value="${esc(r.evidenceLocator?.value||'')}" placeholder="table 2, ligne 7 · série DEXJPUS · accession SEC…"></div></div>
<div class="row"><div class="field"><label>URL source exacte (HTTPS)</label><input id="sourceUrl" type="url" value="${esc(r.sourceUrl||'')}"></div><div class="field"><label>Date de la source</label><input id="sourceDate" type="date" value="${esc(r.sourceDate||'')}"></div></div>
<div class="field"><label>Nature de la source</label><select id="sourceType">${['primary','issuer','dataset','secondary'].map(k=>`<option ${k===r.sourceType?'selected':''}>${k}</option>`).join('')}</select></div>
<div class="field" id="artifactField" style="display:${proof==='reproduction'?'block':'none'}"><label>Artefact de reproduction</label><input id="artifact" value="${esc(r.reproductionArtifact||'')}" placeholder="/preuves/article/calcul.csv"></div>
<div class="actions"><button class="btn primary" id="save">Enregistrer et passer à la suivante</button>${c.review?'<button class="btn danger" id="remove">Retirer la review</button>':''}</div></div>
<div class="commit"><div class="commit-row"><input id="message" value="Review evidence claims"><label class="push"><input type="checkbox" id="push"> push</label><label class="push"><input type="checkbox" id="dryRun"> dry-run</label><button class="btn primary" id="commit">Préparer commande commit</button></div><div class="log" id="log"></div></div>`;
$('#proof').onchange=()=>{const v=$('#proof').value;$('#proofFields').classList.toggle('visible',!!v);$('#artifactField').style.display=v==='reproduction'?'block':'none'};$('#openSources').onclick=()=>{(c.references||[]).filter(x=>/^https?:/.test(x.href)).forEach((x,i)=>setTimeout(()=>window.open(x.href,'_blank','noopener'),i*150))};$('#save').onclick=saveCurrent;if($('#remove'))$('#remove').onclick=removeCurrent;$('#commit').onclick=commitAll}
async function saveCurrent(){const c=state.claims.find(x=>x.id===selected),proof=$('#proof').value;try{await api('/api/review',{method:'POST',body:JSON.stringify({claimId:c.id,kind:$('#kind').value,reviewedBy:$('#reviewedBy').value,note:$('#note').value,proofDepth:proof,evidenceLocator:{type:$('#locatorType').value,value:$('#locatorValue').value},sourceUrl:$('#sourceUrl').value,sourceDate:$('#sourceDate').value,sourceType:$('#sourceType').value,reproductionArtifact:$('#artifact')?.value||''})});await reload();toast('Claim canonique enregistré');const next=currentList().find(x=>x.review?.status!=='canonical');if(next)selectClaim(next.id)}catch(e){toast(e.message,true)}}
async function removeCurrent(){try{await api('/api/remove',{method:'POST',body:JSON.stringify({claimId:selected})});await reload();toast('Review retirée');renderDetail()}catch(e){toast(e.message,true)}}
function terminalCommitCommand() {
  const push = $('#push').checked ? ' --push' : '';
  const dryRun = $('#dryRun').checked ? ' --dry-run' : '';
  const message = commitMessage();
  const shellQuote = (value) => `'${String(value).replace(/'/g, `'\\''`)}'`;
  return `node scripts/review-claims.mjs --commit${push}${dryRun} --message ${shellQuote(message)}`;
}
function commitAll() {
  const log = $('#log');
  const btn = $('#commit');
  const isDefault = commitMessageIsDefault();
  const warning = isDefault
    ? `\n\n⚠️ Avertissement: message vide détecté, la commande utilisera le message par défaut: "Review evidence claims".`
    : '';
  btn.disabled = true;
  log.classList.add('visible');
  log.textContent = `Le commit depuis le navigateur est volontairement désactivé.\n\nRelance en local :\n${terminalCommitCommand()}${warning}\n\nPuis tape EXACTEMENT : CONFIRMER\n\nSécurité: commit Git uniquement en terminal interactif.`;
  toast(isDefault ? 'Message vide: message par défaut utilisé' : 'Commit désactivé dans le navigateur', isDefault);
  btn.disabled = false;
}
async function reload(){state=await api('/api/state');renderList();if(selected)renderDetail()}
$('#search').oninput=renderList;$('#filter').onchange=renderList;reload().then(()=>{const first=currentList()[0];if(first)selectClaim(first.id)}).catch(e=>toast(e.message,true));
</script>
</body></html>
