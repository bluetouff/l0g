# ============================================================
# l0g.fr — vhost Apache statique durci
# Sert /var/www/html/l0g/current (symlink basculé atomiquement par le déploiement).
# Aucun PHP, aucun CGI, aucune exécution. Surface d'attaque = Apache + OS.
#
# Modules requis : ssl, headers, deflate, expires, rewrite
#   a2enmod ssl headers deflate expires rewrite
# ============================================================

# --- HTTP : tout rediriger vers HTTPS (apex) ----------------
<VirtualHost *:80>
    ServerName l0g.fr
    ServerAlias www.l0g.fr
    RewriteEngine On
    RewriteRule ^ https://l0g.fr%{REQUEST_URI} [R=301,L]
</VirtualHost>

# --- www → apex en HTTPS ------------------------------------
<VirtualHost *:443>
    ServerName www.l0g.fr
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/l0g.fr/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/l0g.fr/privkey.pem
    RewriteEngine On
    RewriteRule ^ https://l0g.fr%{REQUEST_URI} [R=301,L]
</VirtualHost>

# --- Site -----------------------------------------------------
<VirtualHost *:443>
    ServerName l0g.fr
    DocumentRoot /var/www/html/l0g/current

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/l0g.fr/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/l0g.fr/privkey.pem
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    <Directory /var/www/html/l0g/current>
        # FollowSymLinks nécessaire pour le symlink `current`.
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # --- En-têtes de sécurité --------------------------------
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"
    Header always set Origin-Agent-Cluster "?1"
    Header always set X-Permitted-Cross-Domain-Policies "none"

    # --- CSP -------------------------------------------------
    # 'unsafe-inline' (script) : Astro rend plusieurs scripts inline locaux
    # (terminal, recherche, progression de lecture). Pas de script inline externe.
    # 'wasm-unsafe-eval'       : moteur de recherche Pagefind (WASM).
    # *.tradingview.com        : scripts + iframes + données des embeds.
    # 'unsafe-inline' (style)  : styles inline Astro et widgets TradingView.
    # Tout le reste (polices, JS du site) est auto-hébergé → 'self'.
    Header always set Content-Security-Policy "\
default-src 'self'; \
script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://s3.tradingview.com https://*.tradingview.com; \
script-src-attr 'none'; \
style-src 'self' 'unsafe-inline'; \
img-src 'self' data: https://*.tradingview.com; \
font-src 'self'; \
connect-src 'self' https://*.tradingview.com https://*.tradingview-widget.com; \
frame-src https://*.tradingview.com https://*.tradingview-widget.com; \
worker-src 'self' blob:; \
manifest-src 'self'; \
media-src 'self'; \
object-src 'none'; base-uri 'self'; form-action 'self'; \
frame-ancestors 'self'; upgrade-insecure-requests"

    # API publique : lecture seule, interopérable depuis n'importe quel navigateur.
    <LocationMatch "^/api(/|$)">
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Accept"
        Header always set Access-Control-Max-Age "86400"
        Header always append Vary "Origin"
        Header always append Vary "Access-Control-Request-Method"
        Header always append Vary "Access-Control-Request-Headers"
    </LocationMatch>

    <Location "/.well-known/security.txt">
        Header set Content-Type "text/plain; charset=utf-8"
        Header set Cache-Control "public, max-age=86400"
    </Location>

    # --- Compression -----------------------------------------
    AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml application/xml application/rss+xml

    # --- Cache : assets fingerprintés immuables, HTML revalidé
    <FilesMatch "\.(js|css|woff2?|svg|png|jpg|jpeg|webp|avif|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "\.(html|xml)$">
        Header set Cache-Control "public, max-age=0, must-revalidate"
    </FilesMatch>

    # --- Divers ----------------------------------------------
    ServerSignature Off
    # Défense en profondeur : si une release embarque accidentellement des sources,
    # Apache ne doit pas les exposer.
    <LocationMatch "^/(src|scripts|deploy|mcp-server|docs|node_modules)(/|$)">
        Require all denied
    </LocationMatch>
    <FilesMatch "(^package(-lock)?\.json$|^tsconfig\.json$|^astro\.config\.mjs$|^renovate\.json$|^README\.md$|\.map$)">
        Require all denied
    </FilesMatch>
    # Bloque l'accès aux éventuels fichiers cachés
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
</VirtualHost>
