# ============================================================
# l0g.fr — vhost Apache statique durci
# Sert /var/www/html/l0g/current (symlink basculé atomiquement par le déploiement).
# Aucun PHP, aucun CGI, aucune exécution. Surface d'attaque = Apache + OS.
#
# Modules requis : ssl, headers, deflate, expires, rewrite, auth_basic, authn_file
#   a2enmod ssl headers deflate expires rewrite auth_basic authn_file
# ============================================================

# --- HTTP : tout rediriger vers HTTPS (apex) ----------------
<VirtualHost *:80>
    ServerName l0g.fr
    ServerAlias www.l0g.fr
    RewriteEngine On
    RewriteRule ^ https://l0g.fr%{REQUEST_URI} [R=301,L]
</VirtualHost>

# --- www → apex en HTTPS ------------------------------------
<VirtualHost *:443>
    ServerName www.l0g.fr
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/l0g.fr/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/l0g.fr/privkey.pem
    RewriteEngine On
    RewriteRule ^ https://l0g.fr%{REQUEST_URI} [R=301,L]
</VirtualHost>

# --- Site -----------------------------------------------------
<VirtualHost *:443>
    ServerName l0g.fr
    DocumentRoot /var/www/html/l0g/current

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/l0g.fr/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/l0g.fr/privkey.pem
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    ErrorLog ${APACHE_LOG_DIR}/l0g.fr-error.log
    CustomLog ${APACHE_LOG_DIR}/l0g.fr-access.log combined

    # Anciens slugs de définitions fusionnées. Ces règles serveur garantissent
    # un vrai 301 ; Astro conserve aussi une page de repli dans l'artefact statique.
    Redirect permanent /glossaire/euv-2/ /glossaire/euv/
    Redirect permanent /glossaire/fonderie-2/ /glossaire/fonderie/
    Redirect permanent /glossaire/hbm-2/ /glossaire/hbm/
    Redirect permanent /glossaire/cip-2/ /glossaire/cip/
    Redirect permanent /glossaire/nbfi-2/ /glossaire/nbfi/
    Redirect permanent /glossaire/x402-2/ /glossaire/x402/

    <Directory /var/www/html/l0g/current>
        # FollowSymLinks nécessaire pour le symlink `current`.
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Données opérationnelles vivantes. Ces Alias doivent rester hors de la
    # release statique afin qu'un build éditorial ne puisse pas les figer.
    Alias /risk.json /var/www/l0g-data/risk.json
    Alias /confluence.json /var/www/l0g-data/confluence.json
    Alias /api/v1/risk.json /var/www/l0g-data/api-risk.json
    Alias /api/v1/risk.xml /var/www/l0g-data/risk-events.xml
    Alias /api/v1/history.ndjson /var/www/l0g-data/history.ndjson
    Alias /api/v1/history.csv /var/www/l0g-data/history.csv
    Alias /api/v1/history/index.json /var/www/l0g-data/index.json
    AddType application/x-ndjson .ndjson

    <Directory /var/www/l0g-data>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <LocationMatch "^/(risk\.json|confluence\.json|api/v1/(risk\.(json|xml)|history(\.|/)))">
        Header set Cache-Control "public, max-age=120, must-revalidate"
    </LocationMatch>

    # --- En-têtes de sécurité --------------------------------
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"
    Header always set Origin-Agent-Cluster "?1"
    Header always set X-Permitted-Cross-Domain-Policies "none"

    # --- CSP -------------------------------------------------
    # Les scripts applicatifs Astro sont externalisés : aucun JavaScript inline.
    # 'wasm-unsafe-eval'      : moteur de recherche Pagefind (WASM).
    # 'unsafe-inline' (style) : styles générés par Astro.
    # Scripts, polices, images et connexions sont auto-hébergés → 'self'.
    Header always set Content-Security-Policy "\
default-src 'self'; \
script-src 'self' 'wasm-unsafe-eval'; \
script-src-attr 'none'; \
style-src 'self' 'unsafe-inline'; \
img-src 'self' data:; \
font-src 'self'; \
connect-src 'self'; \
frame-src 'none'; \
worker-src 'self' blob:; \
manifest-src 'self'; \
media-src 'self'; \
object-src 'none'; base-uri 'self'; form-action 'self'; \
frame-ancestors 'self'; upgrade-insecure-requests"

    # Statistiques historiques : application distincte, authentifiée et isolée
    # de la CSP du site principal. Sa dette inline ne doit jamais élargir la
    # politique l0g. Le fichier htpasswd reste exclusivement sur le serveur.
    Alias /stats /var/www/l0g-stats
    <Directory /var/www/l0g-stats>
        Options -Indexes
        AllowOverride None
        AuthType Basic
        AuthName "Statistiques l0g"
        AuthBasicProvider file
        AuthUserFile /etc/apache2/l0g-stats.htpasswd
        Require valid-user
    </Directory>
    <LocationMatch "^/stats(?:/|$)">
        Header unset Cache-Control
        Header always set Cache-Control "private, no-store, max-age=0"
        Header always set X-Robots-Tag "noindex, nofollow, noarchive"
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'"
    </LocationMatch>

    # API publique : lecture seule, interopérable depuis n'importe quel navigateur.
    <LocationMatch "^/api(/|$)">
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Accept"
        Header always set Access-Control-Max-Age "86400"
        Header always append Vary "Origin"
        Header always append Vary "Access-Control-Request-Method"
        Header always append Vary "Access-Control-Request-Headers"
        Header always set Cross-Origin-Resource-Policy "cross-origin"
    </LocationMatch>

    # Manifestes et cartes de découverte statiques : CORS public uniquement
    # pour GET/HEAD, sans credentials ni élargissement du runtime MCP.
    <LocationMatch "^/(agents\.json|openapi\.json|llms(?:-full(?:-en)?)?\.txt)$">
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Accept"
        Header always set Access-Control-Max-Age "86400"
        Header always set Cross-Origin-Resource-Policy "cross-origin"
        <LimitExcept GET HEAD OPTIONS>
            Require all denied
        </LimitExcept>
    </LocationMatch>

    # MCP est le seul runtime public. Le site principal reste entièrement
    # statique et aucun autre chemin n'est proxifié.
    <Location "/api/mcp/compact">
        ProxyPass "http://127.0.0.1:8848/mcp/compact" timeout=30 retry=0
        ProxyPassReverse "http://127.0.0.1:8848/mcp/compact"
        RequestHeader set X-Forwarded-Proto "https"
        Header always set Cache-Control "no-store"
        Header always unset Access-Control-Allow-Origin
        Header always unset Access-Control-Allow-Methods
        Header always unset Access-Control-Allow-Headers
        Header always set Cross-Origin-Resource-Policy "same-origin"
        <LimitExcept POST GET>
            Require all denied
        </LimitExcept>
    </Location>

    <Location "/api/mcp">
        ProxyPass "http://127.0.0.1:8848/mcp" timeout=30 retry=0
        ProxyPassReverse "http://127.0.0.1:8848/mcp"
        RequestHeader set X-Forwarded-Proto "https"
        Header always set Cache-Control "no-store"
        Header always unset Access-Control-Allow-Origin
        Header always unset Access-Control-Allow-Methods
        Header always unset Access-Control-Allow-Headers
        Header always set Cross-Origin-Resource-Policy "same-origin"
        <LimitExcept POST GET>
            Require all denied
        </LimitExcept>
    </Location>

    <Location "/.well-known/security.txt">
        Header set Content-Type "text/plain; charset=utf-8"
        Header set Cache-Control "public, max-age=86400"
    </Location>

    # --- Compression -----------------------------------------
    AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript \
        application/javascript application/json application/ld+json application/x-ndjson \
        application/wasm image/svg+xml application/xml application/rss+xml

    # --- Cache : seules les ressources Vite fingerprintées sont immuables.
    # Les fichiers publics (pagefind, scripts, images) gardent une URL stable entre
    # releases et doivent donc pouvoir être revalidés après un déploiement.
    <FilesMatch "\.(js|css|woff2?|svg|png|jpg|jpeg|webp|avif|ico)$">
        Header set Cache-Control "public, max-age=86400, stale-while-revalidate=604800"
    </FilesMatch>
    <FilesMatch "\.(html|xml)$">
        Header set Cache-Control "public, max-age=0, must-revalidate"
    </FilesMatch>
    <FilesMatch "\.(json|ndjson|csv|txt)$">
        Header set Cache-Control "public, max-age=300, stale-while-revalidate=3600"
    </FilesMatch>
    <LocationMatch "^/_astro/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # --- Divers ----------------------------------------------
    ServerSignature Off
    # Défense en profondeur : si une release embarque accidentellement des sources,
    # Apache ne doit pas les exposer.
    <LocationMatch "^/(src|scripts|deploy|mcp-server|docs|node_modules)(/|$)">
        Require all denied
    </LocationMatch>
    <FilesMatch "(^package(-lock)?\.json$|^tsconfig\.json$|^astro\.config\.mjs$|^renovate\.json$|^README\.md$|\.map$)">
        Require all denied
    </FilesMatch>
    # Bloque l'accès aux éventuels fichiers cachés
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
</VirtualHost>
