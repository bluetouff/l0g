# Reverse proxy du serveur MCP de l0g.fr
# A inclure DANS le VirtualHost HTTPS de l0g.fr (port 443), pas en global.
#
# Endpoint public : https://l0g.fr/api/mcp  ->  backend local 127.0.0.1:8848/mcp
# Le backend n'est jamais expose directement.
#
# Prerequis (une fois) :
#   sudo a2enmod proxy proxy_http headers
#   sudo systemctl reload apache2

<IfModule mod_proxy.c>
  ProxyRequests Off
  # On transmet le Host public (l0g.fr) au backend, qui le valide.
  ProxyPreserveHost On

  # Chemin public sous /api/. Cette Location prime sur le service de fichiers
  # statiques pour ce chemin exact (il n'existe aucun fichier /api/mcp).
  <Location "/api/mcp">
    # Seules POST et GET ont un sens. On bloque le reste tres tot.
    <LimitExcept POST GET>
      Require all denied
    </LimitExcept>

    # Public /api/mcp  ->  backend /mcp
    ProxyPass        "http://127.0.0.1:8848/mcp" timeout=30 retry=0
    ProxyPassReverse "http://127.0.0.1:8848/mcp"

    # Le proxy ajoute X-Forwarded-For (IP cliente, utilisee pour le rate-limit).
    RequestHeader set X-Forwarded-Proto "https"

    # Pas de mise en cache d'un endpoint applicatif.
    Header always set Cache-Control "no-store"
  </Location>
</IfModule>
